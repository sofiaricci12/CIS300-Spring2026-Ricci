<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sofia Ricci Portfolio</title>
    <link rel="stylesheet" href="portfolio.css">
</head>
<body>

<div id="wrapper">

    <header>
        <h1>SOFIA RICCI PORTFOLIO</h1>
    </header>

    <nav>
        <a href="index.html">HOME</a>
        <a href="exhibitions.html">EXHIBITIONS</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <main class="contact-page">
        <h2>Contact Me</h2>

        <div class="contact-icons">
            <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a>
            <a href="https://www.instagram.com/" target="_blank">Instagram</a>
            <a href="mailto:your@email.com">Email</a>
        </div>

        <form class="contact-form" id="contactForm">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" placeholder="Your Name..." required>
        
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" placeholder="Your Email Address..." required>
        
            <label for="inquiry">Inquiry Type *</label>
            <select id="inquiry" name="inquiry" required>
              <option value="">Select an option</option>
               <option value="general">General Question</option>
              <option value="collaboration">Collaboration</option>
              <option value="commission">Commission Request</option>
              <option value="exhibition">Exhibition Opportunity</option>
            </select>

            <label for="message">Message *</label>
            <textarea id="message" name="message" placeholder="Your Message..." required></textarea>
        
            <button type="submit">Submit</button>
        
            <p id="formResponse"></p>
        </form>
    </main>


    <footer>
        <p>Copyright 2026</p>
        <p>LinkedIn | Instagram | Gmail</p>
    </footer>

</div>

<script>
    document.getElementById("contactForm").addEventListener("submit", function(event) {
        event.preventDefault();
    
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const message = document.getElementById("message").value;
    
        document.getElementById("formResponse").innerHTML =
            "Thank you, " + name + "! Your message has been received.<br><br>" +
            "<strong>Name:</strong> " + name + "<br>" +
            "<strong>Inquiry Type:</strong> " + inquiry + "<br>" +
            "<strong>Email:</strong> " + email + "<br>" +
            "<strong>Message:</strong> " + message;});
    </script>

</body>
</html>
